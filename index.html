<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Before / After</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ba-wrap {
      position: relative;
      width: 100%;
      max-width: 900px;
      aspect-ratio: 4/3;       /* ← 依照你的照片比例調整，人像可改 3/4 */
      overflow: hidden;
      border-radius: 12px;
      user-select: none;
      touch-action: pan-y;
    }

    .ba-img {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;        /* 圖片自動填滿，不變形 */
      display: block;
      pointer-events: none;
    }

    .ba-after-wrap {
      position: absolute;
      top: 0; left: 0;
      height: 100%;
      width: 50%;               /* JS 控制這個值 */
      overflow: hidden;
    }

    .ba-after-wrap .ba-img {
      width: auto;
      min-width: 100vw;         /* 確保 after 圖片不會因為裁切而縮小 */
      max-width: none;
      left: 0;
    }

    /* 分隔線 */
    .ba-line {
      position: absolute;
      top: 0; bottom: 0;
      left: 50%;
      width: 2px;
      background: rgba(255, 255, 255, 0.85);
      transform: translateX(-50%);
      pointer-events: none;
    }

    /* 拖拉把手 */
    .ba-handle {
      position: absolute;
      top: 0;
      left: calc(50% - 24px);
      width: 48px;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: ew-resize;
      z-index: 10;
    }

    .ba-circle {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.95);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      flex-shrink: 0;
    }

    .arrow {
      width: 0; height: 0;
      border-top: 6px solid transparent;
      border-bottom: 6px solid transparent;
    }
    .arrow-l { border-right: 8px solid #444; }
    .arrow-r { border-left: 8px solid #444; }

    /* 標籤 */
    .ba-label {
      position: absolute;
      top: 14px;
      font-family: sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      padding: 4px 12px;
      border-radius: 20px;
      background: rgba(0, 0, 0, 0.4);
      color: #fff;
      pointer-events: none;
      z-index: 5;
    }
    .ba-label-before { left: 14px; }
    .ba-label-after  { right: 14px; }
  </style>
</head>
<body>

<div class="ba-wrap" id="baWrap">

  <!-- =============================================
       換圖說明：
       把 before.jpg / after.jpg 換成你的檔名
       圖片和這個 index.html 放在同一個資料夾
       ============================================= -->
  <img class="ba-img" src="before.jpg" alt="修圖前" id="beforeImg" />

  <div class="ba-after-wrap" id="afterWrap">
    <img class="ba-img" src="after.jpg" alt="修圖後" id="afterImg" />
  </div>

  <span class="ba-label ba-label-before">Before</span>
  <span class="ba-label ba-label-after">After</span>

  <div class="ba-handle" id="baHandle">
    <div class="ba-line"></div>
    <div class="ba-circle">
      <div class="arrow arrow-l"></div>
      <div class="arrow arrow-r"></div>
    </div>
  </div>

</div>

<script>
  const wrap   = document.getElementById('baWrap');
  const aw     = document.getElementById('afterWrap');
  const handle = document.getElementById('baHandle');

  let dragging = false;

  function setPos(clientX) {
    const rect = wrap.getBoundingClientRect();
    let x = clientX - rect.left;
    x = Math.max(0, Math.min(x, rect.width));
    const pct = (x / rect.width * 100).toFixed(2);
    aw.style.width      = pct + '%';
    handle.style.left   = 'calc(' + pct + '% - 24px)';
  }

  // 滑鼠
  handle.addEventListener('mousedown',  e => { dragging = true; e.preventDefault(); });
  document.addEventListener('mousemove', e => { if (dragging) setPos(e.clientX); });
  document.addEventListener('mouseup',   ()  => { dragging = false; });

  // 觸控（手機）
  handle.addEventListener('touchstart', e => { dragging = true; }, { passive: true });
  document.addEventListener('touchmove', e => {
    if (dragging) setPos(e.touches[0].clientX);
  }, { passive: true });
  document.addEventListener('touchend', () => { dragging = false; });
</script>

</body>
</html>
